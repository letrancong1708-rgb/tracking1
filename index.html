<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Tracking - Siêu Ổn Định (Smooth & Persistent)</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        body {
            margin: 0; padding: 0;
            background: #111;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            height: 100vh; font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        .container { 
            position: relative; 
            width: 100vw; height: 100vh;
            max-width: 640px; max-height: 480px; 
            aspect-ratio: 4/3;
        }
        #webcam { display: none; }
        #output_canvas {
            position: absolute; left: 0; top: 0;
            width: 100%; height: 100%;
            transform: scaleX(-1); /* Lật gương */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #status-board {
            position: absolute; top: 15px; left: 15px; right: 15px;
            background: rgba(0, 0, 0, 0.85); color: #fff;
            padding: 15px; border-radius: 8px; font-size: 14px;
            line-height: 1.6; border-left: 5px solid #00ffcc;
            z-index: 10;
        }
        .highlight { color: #00ffcc; font-weight: bold; }
        .upload-zone { margin-top: 10px; }
        .upload-btn {
            background: #00ffcc; color: #111;
            padding: 8px 14px; border: none; border-radius: 4px;
            font-weight: bold; cursor: pointer; font-size: 13px;
        }
        #image-loader { display: none; }
    </style>
</head>
<body>

<div class="container">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="output_canvas" width="640" height="480"></canvas>
    
    <div id="status-board">
        Trạng thái: <span id="state-text" class="highlight">Đang khởi động camera...</span><br>
        <span id="guide-text">Chụm ngón cái + ngón trỏ của cả 2 tay lại để kéo ảnh. Buông tay để giữ nguyên ảnh.</span>
        
        <div class="upload-zone">
            <button class="upload-btn" onclick="document.getElementById('image-loader').click()">Chọn ảnh từ máy</button>
            <input type="file" id="image-loader" accept="image/*">
        </div>
    </div>
</div>

<script>
const videoElement = document.getElementById('webcam');
const canvasElement = document.getElementById('output_canvas');
const canvasCtx = canvasElement.getContext('2d');
const stateText = document.getElementById('state-text');
const guideText = document.getElementById('guide-text');

const demoImage = new Image();
demoImage.src = 'Messenger_creation_9EB2B51C-92B8-488E-9497-D1F38A0530A5.jpeg'; // Ảnh mẫu

document.getElementById('image-loader').addEventListener('change', function(e) {
    const reader = new FileReader();
    reader.onload = function(event) { demoImage.src = event.target.result; }
    if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
});

function getDistance(p1, p2) {
    return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));
}

// CẤU HÌNH LÀM MỊN & ỔN ĐỊNH
const PINCH_THRESHOLD = 45; // Khoảng cách chụm tay
const SMOOTHING_FACTOR = 5;   // Số lượng khung hình dùng để tính trung bình
const MIN_CHANGE_THRESHOLD = 5; // Chỉ cập nhật nếu tay di chuyển quá 5 pixel
let history_p1 = []; // Lịch sử tọa độ tay 1
let history_p2 = []; // Lịch sử tọa độ tay 2
let last_fixed_points = null; // Tọa độ hình chữ nhật cuối cùng được lưu lại

// Hàm tính trung bình cộng tọa độ
function getSmoothPoint(new_point, history) {
    history.push(new_point);
    if (history.length > SMOOTHING_FACTOR) history.shift();
    let sumX = 0, sumY = 0;
    history.forEach(p => { sumX += p.x; sumY += p.y; });
    return { x: sumX / history.length, y: sumY / history.length };
}

function onResults(results) {
    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
    canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

    let currentPinchPoints = [];

    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        for (let i = 0; i < results.multiHandLandmarks.length; i++) {
            const landmarks = results.multiHandLandmarks[i];
            const thumbTip = { x: landmarks[4].x * canvasElement.width, y: landmarks[4].y * canvasElement.height };
            const indexTip = { x: landmarks[8].x * canvasElement.width, y: landmarks[8].y * canvasElement.height };
            
            if (getDistance(thumbTip, indexTip) < PINCH_THRESHOLD) {
                currentPinchPoints.push({ x: (thumbTip.x + indexTip.x) / 2, y: (thumbTip.y + indexTip.y) / 2 });
            }
        }
    }

    // XỬ LÝ LOGIC TRẠNG THÁI VÀ VẼ
    if (currentPinchPoints.length === 2) {
        // Áp dụng bộ lọc làm mịn
        const smooth_p1 = getSmoothPoint(currentPinchPoints[0], history_p1);
        const smooth_p2 = getSmoothPoint(currentPinchPoints[1], history_p2);
        
        // Kiểm tra xem tay có di chuyển đủ xa để cần cập nhật không
        if (!last_fixed_points || 
            getDistance(smooth_p1, last_fixed_points.p1) > MIN_CHANGE_THRESHOLD || 
            getDistance(smooth_p2, last_fixed_points.p2) > MIN_CHANGE_THRESHOLD) {
            
            last_fixed_points = { p1: smooth_p1, p2: smooth_p2 }; // Cập nhật tọa độ mới
        }

        // Vẽ 2 điểm chụm màu xanh khi đang kéo
        stateText.innerText = "ĐANG KÉO TỨ GIÁC";
        guideText.innerText = "Di chuyển 2 tay để thay đổi kích thước. Buông tay ra để giữ nguyên ảnh.";
        canvasCtx.fillStyle = '#00ffcc';
        canvasCtx.beginPath(); canvasCtx.arc(smooth_p1.x, smooth_p1.y, 8, 0, 2 * Math.PI); canvasCtx.fill();
        canvasCtx.beginPath(); canvasCtx.arc(smooth_p2.x, smooth_p2.y, 8, 0, 2 * Math.PI); canvasCtx.fill();
    
    } else if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        stateText.innerText = `SẴN SÀNG`;
        guideText.innerText = "Hãy CHỤM ngón cái và ngón trỏ của CẢ 2 TAY lại để vẽ hình mới.";
        
        // Vẽ định vị tay cho người dùng (ngón trỏ đỏ)
        for (let i = 0; i < results.multiHandLandmarks.length; i++) {
            const indexTip = results.multiHandLandmarks[i][8];
            canvasCtx.fillStyle = '#ff4444';
            canvasCtx.beginPath(); canvasCtx.arc(indexTip.x * canvasElement.width, indexTip.y * canvasElement.height, 6, 0, 2 * Math.PI); canvasCtx.fill();
        }
    }

    // VẼ HÌNH CHỮ NHẬT VÀ ẢNH (DÙNG TỌA ĐỘ ĐÃ LƯU ĐỂ TRÁNH GIẬT/MẤT HÌNH)
    if (last_fixed_points) {
        const { p1, p2 } = last_fixed_points;
        const minX = Math.min(p1.x, p2.x);
        const maxX = Math.max(p1.x, p2.x);
        const minY = Math.min(p1.y, p2.y);
        const maxY = Math.max(p1.y, p2.y);
        const width = maxX - minX;
        const height = maxY - minY;

        // Vẽ viền nét liền vững chắc
        canvasCtx.strokeStyle = '#00ffcc';
        canvasCtx.lineWidth = 4;
        canvasCtx.strokeRect(minX, minY, width, height);

        if (demoImage.complete && width > 20 && height > 20) {
            canvasCtx.drawImage(demoImage, minX, minY, width, height);
        }
    }
}

// KHỞI TẠO MEDIAPIPE HANDS TỐI ƯU
const hands = new Hands({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});
hands.setOptions({
    maxNumHands: 2, 
    modelComplexity: 1, // <--- Đổi thành 1 để nhận diện 2 tay mượt mà hơn trên điện thoại
    minDetectionConfidence: 0.7, // <--- Tăng độ tin cậy để tránh bắt tay sai
    minTrackingConfidence: 0.7
});
hands.onResults(onResults);

// KHỞI TẠO CAMERA STREAM CHO DI ĐỘNG (VERCEL READY)
if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
    navigator.mediaDevices.getUserMedia({
        video: {
            facingMode: "user", // Camera trước
            width: { ideal: 640 }, height: { ideal: 480 }
        }
    }).then((stream) => {
        videoElement.srcObject = stream;
        videoElement.addEventListener('loadeddata', () => {
            async function predictWebcam() {
                if (videoElement.readyState >= 2) await hands.send({ image: videoElement });
                requestAnimationFrame(predictWebcam);
            }
            predictWebcam();
        });
    }).catch((err) => {
        console.error("Camera error: ", err);
        stateText.innerText = "LỖI CAMERA";
        guideText.innerText = "Vui lòng cấp quyền truy cập Camera.";
    });
}
</script>

</body>
</html>
