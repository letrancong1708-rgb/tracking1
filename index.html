<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Tracking - Kéo Ảnh Bằng 2 Tay (Vercel Ready)</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        body {
            margin: 0; padding: 0;
            background: #111;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        .container { 
            position: relative; 
            width: 100vw; height: 100vh;
            max-width: 640px; max-height: 480px; 
            aspect-ratio: 4/3;
        }
        #webcam { display: none; }
        #output_canvas {
            position: absolute; left: 0; top: 0;
            width: 100%; height: 100%;
            transform: scaleX(-1); /* Lật gương thuận tay */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #status-board {
            position: absolute; top: 15px; left: 15px; right: 15px;
            background: rgba(0, 0, 0, 0.85); color: #fff;
            padding: 15px; border-radius: 8px; font-size: 14px;
            line-height: 1.6; border-left: 5px solid #00ffcc;
            z-index: 10;
        }
        .highlight { color: #00ffcc; font-weight: bold; }
        .upload-zone { margin-top: 10px; }
        .upload-btn {
            background: #00ffcc; color: #111;
            padding: 8px 14px; border: none; border-radius: 4px;
            font-weight: bold; cursor: pointer; font-size: 13px;
        }
        #image-loader { display: none; }
    </style>
</head>
<body>

<div class="container">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="output_canvas" width="640" height="480"></canvas>
    
    <div id="status-board">
        Trạng thái: <span id="state-text" class="highlight">Đang quét bàn tay...</span><br>
        <span id="guide-text">Đưa CẢ 2 TAY vào. Chụm ngón cái + ngón trỏ của mỗi tay lại để kéo ảnh.</span>
        
        <div class="upload-zone">
            <button class="upload-btn" onclick="document.getElementById('image-loader').click()">Chọn ảnh từ máy</button>
            <input type="file" id="image-loader" accept="image/*">
        </div>
    </div>
</div>

<script>
const videoElement = document.getElementById('webcam');
const canvasElement = document.getElementById('output_canvas');
const canvasCtx = canvasElement.getContext('2d');
const stateText = document.getElementById('state-text');
const guideText = document.getElementById('guide-text');

// Khởi tạo ảnh mẫu
const demoImage = new Image();
demoImage.src = 'https://picsum.photos/600/400'; 

// Tải ảnh từ thiết bị
document.getElementById('image-loader').addEventListener('change', function(e) {
    const reader = new FileReader();
    reader.onload = function(event) {
        demoImage.src = event.target.result;
    }
    if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
});

// Khoảng cách Euclid
function getDistance(p1, p2) {
    return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));
}

function onResults(results) {
    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
    canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

    let activePoints = []; // Lưu các điểm chụm của các tay hợp lệ
    const PINCH_THRESHOLD = 45; // Ngưỡng nhận diện chụm ngón cái + trỏ

    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        
        // Vòng lặp quét qua từng bàn tay xuất hiện trong camera (Tối đa 2 tay)
        for (let i = 0; i < results.multiHandLandmarks.length; i++) {
            const landmarks = results.multiHandLandmarks[i];
            
            // Lấy tọa độ ngón cái (4) và ngón trỏ (8)
            const thumbTip = { x: landmarks[4].x * canvasElement.width, y: landmarks[4].y * canvasElement.height };
            const indexTip = { x: landmarks[8].x * canvasElement.width, y: landmarks[8].y * canvasElement.height };
            
            const distance = getDistance(thumbTip, indexTip);

            if (distance < PINCH_THRESHOLD) {
                // Nếu tay này đang chụm, lấy điểm trung tâm giữa ngón cái và ngón trỏ làm mốc góc
                const pinchCenter = {
                    x: (thumbTip.x + indexTip.x) / 2,
                    y: (thumbTip.y + indexTip.y) / 2
                };
                activePoints.push(pinchCenter);

                // Vẽ vòng tròn thông báo đang chụm tốt tại vị trí tay đó
                canvasCtx.fillStyle = '#00ffcc';
                canvasCtx.beginPath(); canvasCtx.arc(pinchCenter.x, pinchCenter.y, 10, 0, 2 * Math.PI); canvasCtx.fill();
            } else {
                // Nếu chưa chụm, vẽ 2 đốm màu để định vị tay cho người dùng biết
                canvasCtx.fillStyle = '#ffcc00';
                canvasCtx.beginPath(); canvasCtx.arc(thumbTip.x, thumbTip.y, 6, 0, 2 * Math.PI); canvasCtx.fill();
                canvasCtx.beginPath(); canvasCtx.arc(indexTip.x, indexTip.y, 6, 0, 2 * Math.PI); canvasCtx.fill();
            }
        }
    }

    // XỬ LÝ HIỂN THỊ ẢNH THEO 2 ĐIỂM CHỤM CỦA 2 TAY
    if (activePoints.length === 2) {
        stateText.innerText = "ĐANG HIỆN ẢNH";
        guideText.innerText = "Di chuyển 2 tay ra xa/lại gần để co dãn hình chữ nhật ảnh.";

        const p1 = activePoints[0];
        const p2 = activePoints[1];

        // Tạo hình chữ nhật từ 2 điểm góc chéo nhau
        const minX = Math.min(p1.x, p2.x);
        const maxX = Math.max(p1.x, p2.x);
        const minY = Math.min(p1.y, p2.y);
        const maxY = Math.max(p1.y, p2.y);
        const width = maxX - minX;
        const height = maxY - minY;

        // Vẽ viền khung chữ nhật
        canvasCtx.strokeStyle = '#00ffcc';
        canvasCtx.lineWidth = 4;
        canvasCtx.strokeRect(minX, minY, width, height);

        // Chèn ảnh vào giữa hình chữ nhật
        if (demoImage.complete && width > 10 && height > 10) {
            canvasCtx.drawImage(demoImage, minX, minY, width, height);
        }
    } else if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        stateText.innerText = `PHÁT HIỆN ${results.multiHandLandmarks.length} TAY`;
        guideText.innerText = "Hãy CHỤM ngón cái + ngón trỏ của CẢ HAI tay lại.";
    } else {
        stateText.innerText = "ĐANG TÌM TAY...";
        guideText.innerText = "Hãy đưa cả 2 bàn tay vào vùng nhìn thấy của camera.";
    }
}

// Cấu hình MediaPipe nhận diện tối đa 2 bàn tay
const hands = new Hands({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});
hands.setOptions({
    maxNumHands: 2, // <--- Quan trọng: bật chế độ 2 tay cùng lúc
    modelComplexity: 1, 
    minDetectionConfidence: 0.5, 
    minTrackingConfidence: 0.5
});
hands.onResults(onResults);

// Khởi tạo Camera stream tương thích hoàn toàn cho Vercel di động
if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
    navigator.mediaDevices.getUserMedia({
        video: {
            facingMode: "user",
            width: { ideal: 640 },
            height: { ideal: 480 }
        }
    }).then((stream) => {
        videoElement.srcObject = stream;
        videoElement.addEventListener('loadeddata', () => {
            async function predictWebcam() {
                if (videoElement.readyState >= 2) {
                    await hands.send({ image: videoElement });
                }
                requestAnimationFrame(predictWebcam);
            }
            predictWebcam();
        });
    }).catch((err) => {
        console.error("Lỗi camera: ", err);
        stateText.innerText = "LỖI CAMERA";
        guideText.innerText = "Vui lòng kiểm tra quyền cho phép camera của trình duyệt.";
    });
} else {
    alert("Trình duyệt không hỗ trợ Camera API.");
}
</script>

</body>
</html>
