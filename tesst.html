<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Tracking - Chụm Kéo Hiện Ảnh</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        body {
            margin: 0; padding: 0;
            background: #1a1a1a;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container { position: relative; width: 640px; height: 480px; }
        #webcam { display: none; }
        #output_canvas {
            position: absolute; left: 0; top: 0;
            border: 3px solid #333; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transform: scaleX(-1); /* Lật gương */
        }
        #status-board {
            position: absolute; top: 15px; left: 15px; right: 15px;
            background: rgba(0, 0, 0, 0.75); color: #fff;
            padding: 12px; border-radius: 8px;
            font-size: 14px; pointer-events: none;
            line-height: 1.5; border-left: 5px solid #ffcc00;
        }
        .highlight { color: #00ffcc; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <video id="webcam" autoplay playsinline></video>
    <canvas id="output_canvas" width="640" height="480"></canvas>
    <div id="status-board">
        Trạng thái: <span id="state-text" class="highlight">Đang tìm tay...</span><br>
        <span id="guide-text">Hãy đưa bàn tay vào khung hình.</span>
    </div>
</div>

<script>
const videoElement = document.getElementById('webcam');
const canvasElement = document.getElementById('output_canvas');
const canvasCtx = canvasElement.getContext('2d');
const stateText = document.getElementById('state-text');
const guideText = document.getElementById('guide-text');

// Tải ảnh mẫu
const demoImage = new Image();
demoImage.src = 'https://picsum.photos/600/400'; 

// Quản lý trạng thái hệ thống
// Các trạng thái: 'IDLE' (Trống), 'PINCHED' (Đang chụm), 'DRAWING' (Đang kéo bung ảnh)
let currentStatus = 'IDLE'; 
let lockedPoints = null; // Lưu tọa độ tứ giác cuối cùng để giữ lại ảnh

// Hàm tính khoảng cách Euclid giữa 2 điểm
function getDistance(p1, p2) {
    return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));
}

function onResults(results) {
    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
    // Vẽ camera nền
    canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const landmarks = results.multiHandLandmarks[0]; // Chỉ bắt 1 tay duy nhất

        // Lấy tọa độ các ngón tay quan trọng (đã nhân với kích thước canvas)
        const thumbTip = { x: landmarks[4].x * canvasElement.width, y: landmarks[4].y * canvasElement.height };
        const indexTip = { x: landmarks[8].x * canvasElement.width, y: landmarks[8].y * canvasElement.height };
        const middleTip = { x: landmarks[12].x * canvasElement.width, y: landmarks[12].y * canvasElement.height };
        const ringTip = { x: landmarks[16].x * canvasElement.width, y: landmarks[16].y * canvasElement.height };
        const pinkyTip = { x: landmarks[20].x * canvasElement.width, y: landmarks[20].y * canvasElement.height };

        const 4Tips = [indexTip, middleTip, ringTip, pinkyTip];

        // 1. Tính toán khoảng cách chụm (Ngón cái vs Ngón trỏ)
        const pinchDistance = getDistance(thumbTip, indexTip);
        
        // Ngưỡng chụm tay (tùy chỉnh nếu camera xa/gần, tầm 30-40 pixel là vừa)
        const PINCH_THRESHOLD = 35; 

        // 2. XỬ LÝ MÁY TRẠNG THÁI
        if (currentStatus === 'IDLE') {
            stateText.innerText = "SẴN SÀNG";
            guideText.innerText = "HÃY CHỤM NGÓN CÁI VÀ NGÓN TRỎ LẠI ĐỂ KÍCH HOẠT.";
            
            if (pinchDistance < PINCH_THRESHOLD) {
                currentStatus = 'PINCHED';
            }
        } 
        else if (currentStatus === 'PINCHED') {
            stateText.innerText = "ĐÃ KÍCH HOẠT (ĐANG CHỤM)";
            guideText.innerText = "BÂY GIỜ HÃY BUNG RỘNG 4 NGÓN TAY ĐỂ KÉO ẢNH RA.";
            
            // Nếu khoảng cách bắt đầu nới rộng ra -> Chuyển sang trạng thái vẽ/kéo
            if (pinchDistance > PINCH_THRESHOLD + 15) {
                currentStatus = 'DRAWING';
            }
        } 
        else if (currentStatus === 'DRAWING') {
            stateText.innerText = "ĐANG KÉO TỨ GIÁC ẢNH";
            guideText.innerText = "Xòe rộng để phóng to. Thu tay lại sát (chụm) để chốt khóa ảnh.";

            // Cập nhật tọa độ tứ giác theo vị trí 4 đầu ngón tay hiện tại
            lockedPoints = [...4Tips];

            // Nếu người dùng chụm tay lại một lần nữa -> Khóa ảnh cố định tại đó luôn
            if (pinchDistance < PINCH_THRESHOLD) {
                currentStatus = 'LOCKED';
            }
        }
        else if (currentStatus === 'LOCKED') {
            stateText.innerText = "ĐÃ KHÓA ẢNH";
            guideText.innerText = "Ảnh đã được chốt cố định. Đưa tay ra xa hẳn hoặc chụm lại lâu để reset.";
            
            // Reset nếu muốn làm lại từ đầu (khi đưa tay ra xa hoặc không chụm nữa)
            if (pinchDistance > PINCH_THRESHOLD + 40) {
                // Giữ nguyên ảnh cũ, nhưng cho phép kích hoạt hình mới nếu chụm lại
                currentStatus = 'IDLE'; 
            }
        }

        // Vẽ các tracker đầu ngón tay để người dùng dễ định vị
        canvasCtx.fillStyle = '#00ffcc';
        4Tips.forEach(pt => {
            canvasCtx.beginPath();
            canvasCtx.arc(pt.x, pt.y, 6, 0, 2 * Math.PI);
            canvasCtx.fill();
        });
        // Vẽ riêng nốt ngón cái màu vàng để nhận biết nút bấm chụm
        canvasCtx.fillStyle = '#ffcc00';
        canvasCtx.beginPath();
        canvasCtx.arc(thumbTip.x, thumbTip.y, 7, 0, 2 * Math.PI);
        canvasCtx.fill();
    }

    // 3. TIẾN HÀNH VẼ ẢNH (Dựa trên tọa độ đã lưu/khóa)
    if (lockedPoints && (currentStatus === 'DRAWING' || currentStatus === 'LOCKED' || currentStatus === 'IDLE')) {
        // Vẽ viền tứ giác bằng nét đứt neon
        canvasCtx.strokeStyle = '#00ffcc';
        canvasCtx.lineWidth = 3;
        canvasCtx.setLineDash([5, 5]);
        canvasCtx.beginPath();
        canvasCtx.moveTo(lockedPoints[0].x, lockedPoints[0].y);
        canvasCtx.lineTo(lockedPoints[1].x, lockedPoints[1].y);
        canvasCtx.lineTo(lockedPoints[2].x, lockedPoints[2].y);
        canvasCtx.lineTo(lockedPoints[3].x, lockedPoints[3].y);
        canvasCtx.closePath();
        canvasCtx.stroke();
        canvasCtx.setLineDash([]); // Reset nét liền

        // Đổ ảnh vào lòng tứ giác
        canvasCtx.save();
        canvasCtx.beginPath();
        canvasCtx.moveTo(lockedPoints[0].x, lockedPoints[0].y);
        canvasCtx.lineTo(lockedPoints[1].x, lockedPoints[1].y);
        canvasCtx.lineTo(lockedPoints[2].x, lockedPoints[2].y);
        canvasCtx.lineTo(lockedPoints[3].x, lockedPoints[3].y);
        canvasCtx.closePath();
        canvasCtx.clip();

        // Thuật toán quét khung bao (Bounding Box) để co dãn ảnh
        const xs = lockedPoints.map(p => p.x);
        const ys = lockedPoints.map(p => p.y);
        const minX = Math.min(...xs);
        const maxX = Math.max(...xs);
        const minY = Math.min(...ys);
        const maxY = Math.max(...ys);

        if (demoImage.complete) {
            canvasCtx.drawImage(demoImage, minX, minY, maxX - minX, maxY - minY);
        }
        canvasCtx.restore();
    }
}

// Cấu hình MediaPipe Hands
const hands = new Hands({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
    maxNumHands: 1,
    modelComplexity: 1,
    minDetectionConfidence: 0.6, // Tăng độ chính xác nhận diện
    minTrackingConfidence: 0.6
});
hands.onResults(onResults);

// Khởi tạo camera
const camera = new Camera(videoElement, {
    onFrame: async () => {
        await hands.send({image: videoElement});
    },
    width: 640,
    height: 480
});
camera.start();
</script>

</body>
</html>
